name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1-5"  
  push:
    branches:
      - main 

permissions:
  contents: write
  issues: write
  pull-requests: write
  
concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.18
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_REQUIRE_CONFIG: required
          RENOVATE_HOST_RULES: >-
            [{
              "hostType": "docker",
              "matchHost": "docker.io",
              "username": "${{ secrets.RENOVATE_DOCKER_USERNAME }}",
              "password": "${{ secrets.RENOVATE_DOCKER_PASSWORD }}"
            }]
