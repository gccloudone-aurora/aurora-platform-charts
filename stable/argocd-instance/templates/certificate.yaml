{{- if .Values.argocdInstance.certificate.selfSigned }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
{{- end }}
{{- if .Values.argocdInstance.ingressDomain }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-server-tls
  labels:
    use-general-solver: "true"
    {{- include "argocd-foundation.labels" $ | nindent 4 }}
spec:
  commonName: {{ .Values.argocdInstance.ingressDomain }}
  dnsNames:
    - {{ .Values.argocdInstance.ingressDomain }}
  {{- if .Values.argocdInstance.certificate.selfSigned }}
  issuerRef:
    kind: ClusterIssuer
    name: selfsigned-issuer
    group: cert-manager.io
  privateKey:
    algorithm: ECDSA
    size: 256
  {{- else }}
  issuerRef:
    kind: ClusterIssuer
    name: {{ .Values.argocdInstance.certificate.clusterIssuer }}
  secretName: argocd-server-tls
  {{- end }}
{{- end }}
