{{- range $name, $value := default dict .Values.register.repositories }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    argocd.argoproj.io/secret-type: repository
    {{- include "argocd-foundation.labels" $ | nindent 4 }}
stringData:
  type: {{ $value.type }}
  url: {{ $value.url }}
{{- end }}

{{- range $name, $value := default dict .Values.register.repositoryCreds }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    argocd.argoproj.io/secret-type: repo-creds
    {{- include "argocd-foundation.labels" $ | nindent 4 }}
stringData:
  type: {{ $value.type }}
  url: {{ $value.url }}
  {{- if $value.githubApp }}
  {{- $app := $value.githubApp }}
  {{- if or (not $app.id) (not $app.installationID) (not $app.privateKey) }}
  {{- fail (printf "register.repositoryCreds.%s.githubApp requires id, installationID, and privateKey" $name) }}
  {{- end }}
  githubAppID: {{ $app.id | quote }}
  githubAppInstallationID: {{ $app.installationID | quote }}
  githubAppPrivateKey: {{ $app.privateKey | quote }}
  {{- if $app.enterpriseBaseUrl }}
  githubAppEnterpriseBaseUrl: {{ $app.enterpriseBaseUrl }}
  {{- end }}
  {{- else }}
  username: {{ $value.username }}
  password: {{ $value.password }}
  {{- end }}
{{- end }}
