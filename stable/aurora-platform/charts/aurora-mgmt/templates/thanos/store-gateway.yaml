{{ if .Values.components.thanos.enabled -}}
{{- $t := .Values.components.thanos -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-thanos-storegateway"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    plugin:
      env:
        - name: HELM_RELEASE_NAME
          value: "thanos-storegateway"
        - name: HELM_VALUES
          value: |
            resources:
            {{- range $b := $t.objectStorage.buckets }}
              - apiVersion: v1
                kind: ServiceAccount
                metadata:
                  name: thanos-storegateway-{{ $b.name }}
                  namespace: thanos-system
                  {{- if eq $t.objectStorage.auth "workloadIdentity" }}
                  annotations:
                    azure.workload.identity/client-id: {{ required "components.thanos.objectStorage.buckets[].clientId is required for workloadIdentity" $b.clientId | quote }}
                  {{- end }}
                  labels:
                    app.kubernetes.io/name: thanos-storegateway
                    app.kubernetes.io/component: store-gateway
                    app.kubernetes.io/part-of: thanos
                    app.kubernetes.io/managed-by: argo
                    thanos.io/bucket: {{ $b.name }}
              - apiVersion: apps/v1
                kind: StatefulSet
                metadata:
                  name: thanos-storegateway-{{ $b.name }}
                  namespace: thanos-system
                  labels:
                    app.kubernetes.io/name: thanos-storegateway
                    app.kubernetes.io/component: store-gateway
                    app.kubernetes.io/part-of: thanos
                    app.kubernetes.io/managed-by: argo
                    thanos.io/bucket: {{ $b.name }}
                spec:
                  replicas: {{ $t.storeGateway.replicas }}
                  serviceName: thanos-storegateway-{{ $b.name }}
                  selector:
                    matchLabels:
                      app.kubernetes.io/name: thanos-storegateway
                      thanos.io/bucket: {{ $b.name }}
                  template:
                    metadata:
                      labels:
                        app.kubernetes.io/name: thanos-storegateway
                        app.kubernetes.io/component: store-gateway
                        app.kubernetes.io/part-of: thanos
                        thanos.io/bucket: {{ $b.name }}
                        {{- if eq $t.objectStorage.auth "workloadIdentity" }}
                        azure.workload.identity/use: "true"
                        {{- end }}
                    spec:
                      serviceAccountName: thanos-storegateway-{{ $b.name }}
                      priorityClassName: {{ $t.priorityClassName }}
                      nodeSelector: {{ toYaml $t.storeGateway.nodeSelector | nindent 24 }}
                      tolerations: {{ toYaml $t.storeGateway.tolerations | nindent 24 }}
                      affinity: {{ toYaml $t.storeGateway.affinity | nindent 24 }}
                      securityContext:
                        runAsNonRoot: true
                        runAsUser: 1001
                        runAsGroup: 1001
                        fsGroup: 1001
                        seccompProfile:
                          type: RuntimeDefault
                      containers:
                        - name: thanos-storegateway
                          image: {{ include "thanos.image" $ }}
                          imagePullPolicy: {{ default "IfNotPresent" $t.image.pullPolicy }}
                          args:
                            - store
                            - --log.level={{ $t.logLevel }}
                            - --grpc-address=0.0.0.0:10901
                            - --http-address=0.0.0.0:10902
                            - --data-dir=/var/thanos/store
                            - --objstore.config-file=/etc/thanos/objstore.yml
                          ports:
                            - name: grpc
                              containerPort: 10901
                            - name: http
                              containerPort: 10902
                          resources: {{ toYaml $t.storeGateway.resources | nindent 28 }}
                          livenessProbe:
                            httpGet:
                              path: /-/healthy
                              port: http
                            initialDelaySeconds: 30
                          readinessProbe:
                            httpGet:
                              path: /-/ready
                              port: http
                            initialDelaySeconds: 15
                          securityContext:
                            allowPrivilegeEscalation: false
                            readOnlyRootFilesystem: true
                            capabilities:
                              drop: ["ALL"]
                          volumeMounts:
                            - name: objstore-config
                              mountPath: /etc/thanos
                              readOnly: true
                            - name: data
                              mountPath: /var/thanos/store
                      volumes:
                        - name: objstore-config
                          secret:
                            secretName: thanos-objstore-{{ $b.name }}
                  volumeClaimTemplates:
                    - metadata:
                        name: data
                      spec:
                        accessModes: ["ReadWriteOnce"]
                        storageClassName: {{ $t.storeGateway.persistence.storageClassName }}
                        resources:
                          requests:
                            storage: {{ $t.storeGateway.persistence.size }}
              # Per-bucket governing (headless) Service — stable pod DNS + ServiceMonitor target.
              - apiVersion: v1
                kind: Service
                metadata:
                  name: thanos-storegateway-{{ $b.name }}
                  namespace: thanos-system
                  labels:
                    app.kubernetes.io/name: thanos-storegateway
                    app.kubernetes.io/component: store-gateway
                    app.kubernetes.io/part-of: thanos
                    app.kubernetes.io/managed-by: argo
                    thanos.io/bucket: {{ $b.name }}
                spec:
                  clusterIP: None
                  selector:
                    app.kubernetes.io/name: thanos-storegateway
                    thanos.io/bucket: {{ $b.name }}
                  ports:
                    - name: grpc
                      port: 10901
                      targetPort: grpc
                    - name: http
                      port: 10902
                      targetPort: http
            {{- end }}
            # Aggregate discovery (headless) Service across ALL buckets — the Querier resolves
            # this one DNS name (dnssrv+_grpc._tcp) to every Store Gateway pod, so adding a
            # bucket is auto-discovered with no Querier change. Distinct name to avoid being
            # scraped twice by the per-bucket ServiceMonitor.
              - apiVersion: v1
                kind: Service
                metadata:
                  name: thanos-storegateway
                  namespace: thanos-system
                  labels:
                    app.kubernetes.io/name: thanos-storegateway-discovery
                    app.kubernetes.io/component: store-gateway
                    app.kubernetes.io/part-of: thanos
                    app.kubernetes.io/managed-by: argo
                spec:
                  clusterIP: None
                  selector:
                    app.kubernetes.io/name: thanos-storegateway
                  ports:
                    - name: grpc
                      port: 10901
                      targetPort: grpc
  destination:
    name: {{ .Values.global.cluster }}
    namespace: thanos-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
