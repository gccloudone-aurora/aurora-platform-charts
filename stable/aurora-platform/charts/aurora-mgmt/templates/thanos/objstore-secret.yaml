{{ if .Values.components.thanos.enabled -}}
{{- $t := .Values.components.thanos -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-thanos-objstore"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    plugin:
      env:
        - name: HELM_RELEASE_NAME
          value: "thanos-objstore"
        - name: HELM_VALUES
          value: |
            resources:
            {{- range $b := $t.objectStorage.buckets }}
              # objstore.yml for bucket "{{ $b.name }}". Workload-identity auth: storage_account_key
              # is empty, the SDK uses the federated token from the pod's azure.workload.identity SA.
              - apiVersion: v1
                kind: Secret
                metadata:
                  name: thanos-objstore-{{ $b.name }}
                  namespace: thanos-system
                  labels:
                    app.kubernetes.io/name: thanos-objstore
                    app.kubernetes.io/part-of: thanos
                    app.kubernetes.io/managed-by: argo
                type: Opaque
                stringData:
                  objstore.yml: |
                    type: AZURE
                    config:
                      storage_account: {{ required "components.thanos.objectStorage.buckets[].storageAccountName is required" $b.storageAccountName | quote }}
                      container: {{ $b.containerName | quote }}
                      endpoint: {{ $b.endpoint | quote }}
                      storage_account_key: ""
            {{- end }}
  destination:
    name: {{ .Values.global.cluster }}
    namespace: thanos-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
