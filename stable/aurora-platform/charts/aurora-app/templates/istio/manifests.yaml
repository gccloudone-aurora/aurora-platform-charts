{{ if .Values.components.istio.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-istio-manifests"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    helm:
      releaseName: istio-manifests
      values: |
        resources:
          - apiVersion: security.istio.io/v1beta1
            kind: PeerAuthentication
            metadata:
              name: default
              namespace: istio-system
            spec:
              mtls:
                mode: STRICT
          - apiVersion: v1
            kind: ResourceQuota
            metadata:
              name: istio-system-critical-pods-quota
              namespace: istio-system
            spec:
              hard:
                pods: "100"
              scopeSelector:
                matchExpressions:
                  - operator: In
                    scopeName: PriorityClass
                    values:
                      - system-cluster-critical
                      - system-node-critical
          {{- if eq .Values.global.provider "gcp" }}
          - apiVersion: networking.gke.io/v1
            kind: HealthCheckPolicy
            metadata:
              name: istio-gateway-health-check
              namespace: istio-general-system
            spec:
              default:
                checkIntervalSec: 30
                timeoutSec: 5
                healthyThreshold: 1
                unhealthyThreshold: 2
                config:
                  type: HTTP
                  httpHealthCheck:
                    port: 8080
                    requestPath: /healthz
              targetRef:
                group: ""
                kind: Service
                name: general
          {{- if hasKey .Values.components.istio.gateway "iap" | quote }}
          - apiVersion: v1
            kind: Secret
            metadata:
              name: iap-oauth-secret
              namespace: istio-general-system
            type: Opaque
            stringData:
              client_secret: {{ .Values.components.istio.gateway.iap.clientSecret | quote}}
          - apiVersion: networking.gke.io/v1
            kind: GCPBackendPolicy
            metadata:
              name: istio-iap-policy
              namespace: istio-general-system
            spec:
              default:
                iap:
                  enabled: true
                  oauth2ClientSecret:
                    name: iap-oauth-secret
                  clientID: {{ .Values.components.istio.gateway.iap.clientID }}
              targetRef:
                group: ""
                kind: Service
                name: general
          {{- end }}
          {{- end }}
  destination:
    name: {{ .Values.global.cluster }}
    namespace: platform-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
