groups:
- name: trivy.rules
  rules:
  - alert: TrivyVulnerabilitiesReport
    expr: 'sum (max by (image_repository, image_tag) (trivy_image_vulnerabilities{severity="Critical", image_registry!~"mcr\\.microsoft\\.com|.*\\.azurecr\\.io|.*\\.amazonaws\\.com|gcr\\.io"} * on (namespace) group_left() kube_namespace_labels{label_namespace_ssc_spc_gc_ca_purpose="system"})) > 0'
    for: 5m
    keep_firing_for: 15m
    labels:
      severity: P1-Critical
      scope: cluster
      teams_version: v2
      vuln_type: summary_crit
    annotations:
      message: 'Cluster has {{ printf "%.0f" $$value }} critical vulnerabilities.'
  
  - alert: TrivyVulnerabilitiesReport
    expr: 'sum (max by (image_repository, image_tag) (trivy_image_vulnerabilities{severity="High", image_registry!~"mcr\\.microsoft\\.com|.*\\.azurecr\\.io|.*\\.amazonaws\\.com|gcr\\.io"} * on (namespace) group_left() kube_namespace_labels{label_namespace_ssc_spc_gc_ca_purpose="system"})) > 0'
    for: 5m
    keep_firing_for: 15m
    labels:
      severity: P2-Major
      scope: cluster
      teams_version: v2
      vuln_type: summary_high
    annotations:
      message: 'Cluster has {{ printf "%.0f" $$value }} high vulnerabilities.'

  - alert: TrivyVulnerabilitiesReport
    expr: 'sum (max by (image_repository, image_tag) (delta(trivy_image_vulnerabilities{severity="Critical", image_registry!~"mcr\\.microsoft\\.com|.*\\.azurecr\\.io|.*\\.amazonaws\\.com|gcr\\.io"}[24h]) * on (namespace) group_left() kube_namespace_labels{label_namespace_ssc_spc_gc_ca_purpose="system"})) != 0'
    for: 5m
    keep_firing_for: 15m
    labels:
      severity: P1-Critical
      scope: cluster
      teams_version: v2
      vuln_type: 24h_delta_crit
    annotations:
      message: 'Cluster has a 24h delta of {{ printf "%.0f" $$value }} critical vulnerabilities.'
  
  - alert: TrivyVulnerabilitiesReport
    expr: 'sum (max by (image_repository, image_tag) (delta(trivy_image_vulnerabilities{severity="High", image_registry!~"mcr\\.microsoft\\.com|.*\\.azurecr\\.io|.*\\.amazonaws\\.com|gcr\\.io"}[24h]) * on (namespace) group_left() kube_namespace_labels{label_namespace_ssc_spc_gc_ca_purpose="system"})) != 0'
    for: 5m
    keep_firing_for: 15m
    labels:
      severity: P2-Major
      scope: cluster
      teams_version: v2
      vuln_type: 24h_delta_high
    annotations:
      message: 'Cluster has a 24h delta of {{ printf "%.0f" $$value }} high vulnerabilities.'
    
  - alert: TrivyVulnerabilitiesReport
    expr: 'sum (max by (image_repository, image_tag) (delta(trivy_image_vulnerabilities{severity="Critical", image_registry!~"mcr\\.microsoft\\.com|.*\\.azurecr\\.io|.*\\.amazonaws\\.com|gcr\\.io"}[7d]) * on (namespace) group_left() kube_namespace_labels{label_namespace_ssc_spc_gc_ca_purpose="system"})) != 0'
    for: 5m
    keep_firing_for: 15m
    labels:
      severity: P1-Critical
      scope: cluster
      teams_version: v2
      vuln_type: 7d_delta_crit
    annotations:
      message: 'Cluster has a 7d delta of {{ printf "%.0f" $$value }} critical vulnerabilities.'
  
  - alert: TrivyVulnerabilitiesReport
    expr: 'sum (max by (image_repository, image_tag) (delta(trivy_image_vulnerabilities{severity="High", image_registry!~"mcr\\.microsoft\\.com|.*\\.azurecr\\.io|.*\\.amazonaws\\.com|gcr\\.io"}[7d]) * on (namespace) group_left() kube_namespace_labels{label_namespace_ssc_spc_gc_ca_purpose="system"})) != 0'
    for: 5m
    keep_firing_for: 15m
    labels:
      severity: P2-Major
      scope: cluster
      teams_version: v2
      vuln_type: 7d_delta_high
    annotations:
      message: 'Cluster has a 7d delta of {{ printf "%.0f" $$value }} high vulnerabilities.'
