{{ if .Values.components.grafana.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-grafana-dashboard-resources"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    helm:
      releaseName: grafana-dashboard-resources
      values: |
        resources:
{{- range $path, $_ := .Files.Glob "conf/grafana_dashboards/*.json" }}
{{- $dashboardName := trimSuffix ".json" (base $path) }}
          - apiVersion: grafana.integreatly.org/v1beta1
            kind: GrafanaDashboard
            metadata:
              name: {{ $dashboardName }}-dashboard
              namespace: grafana-system
            spec:
              instanceSelector:
                matchLabels:
                  dashboards: "aurora"
              json: |-
{{ $.Files.Get $path | nindent 16 }}
{{- end }}
  destination:
    name: {{ .Values.global.cluster }}
    namespace: grafana-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
