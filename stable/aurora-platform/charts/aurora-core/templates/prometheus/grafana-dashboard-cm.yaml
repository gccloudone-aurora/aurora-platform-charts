{{ if .Values.components.prometheus.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-trivy-grafana-dashboard-cm"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    plugin:
      env:
        - name: HELM_RELEASE_NAME
          value: "trivy-grafana-dashboard-cm"
        - name: HELM_VALUES
          value: |
            resources:
              - apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: trivy-operator-dashboard
                  labels:
                    grafana_dashboard: "1" # Required label for sidecar discovery
                data:
                  simplest-dashboard.json: |-
                    {
                      "annotations": {
                        "list": [
                          {
                            "builtIn": 1,
                            "datasource": {
                              "type": "grafana",
                              "uid": "-- Grafana --"
                            },
                            "enable": true,
                            "hide": true,
                            "iconColor": "rgba(0, 211, 255, 1)",
                            "name": "Annotations & Alerts",
                            "target": {
                              "limit": 100,
                              "matchAny": false,
                              "tags": [],
                              "type": "dashboard"
                            },
                            "type": "dashboard"
                          }
                        ]
                      },
                      "description": "This Dashboard is used to visualise the metrics from the security reports of the Trivy Operator",
                      "editable": true,
                      "fiscalYearStartMonth": 0,
                      "graphTooltip": 0,
                      "links": [],
                      "panels": [
                        {
                          "collapsed": false,
                          "gridPos": {
                            "h": 1,
                            "w": 24,
                            "x": 0,
                            "y": 0
                          },
                          "id": 12,
                          "panels": [],
                          "title": "Quick Overview",
                          "type": "row"
                        },
                        {
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "description": "Total number by type of security issues identified in the cluster",
                          "fieldConfig": {
                            "defaults": {
                              "mappings": [],
                              "thresholds": {
                                "mode": "absolute",
                                "steps": [
                                  {
                                    "color": "green",
                                    "value": 0
                                  },
                                  {
                                    "color": "red",
                                    "value": 1
                                  }
                                ]
                              },
                              "unit": "none"
                            },
                            "overrides": [
                              {
                                "matcher": {
                                  "id": "byName",
                                  "options": "Critical"
                                },
                                "properties": [
                                  {
                                    "id": "color",
                                    "value": {
                                      "fixedColor": "red",
                                      "mode": "fixed"
                                    }
                                  }
                                ]
                              },
                              {
                                "matcher": {
                                  "id": "byName",
                                  "options": "High"
                                },
                                "properties": [
                                  {
                                    "id": "color",
                                    "value": {
