                          "pluginVersion": "12.4.1",
                          "targets": [
                            {
                              "datasource": {
                                "type": "prometheus",
                                "uid": "prometheus"
                              },
                              "editorMode": "code",
                              "exemplar": false,
                              "expr": "sum(\r\n    max by (image_registry, image_repository, image_tag, severity) (\r\n        (trivy_image_vulnerabilities{severity=\"Critical\"} > 0)\r\n        * on(namespace) group_left()\r\n        kube_namespace_labels{label_namespace_ssc_spc_gc_ca_purpose=\"system\"}\r\n    )\r\n) OR on() vector(0)",
