                              },
                              {
                                "matcher": {
                                  "id": "byName",
                                  "options": "Medium"
                                },
                                "properties": [
                                  {
                                    "id": "color",
                                    "value": {
                                      "fixedColor": "dark-yellow",
                                      "mode": "fixed"
