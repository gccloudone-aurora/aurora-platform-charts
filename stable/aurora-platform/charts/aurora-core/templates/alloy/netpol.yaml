{{ if .Values.components.alloy.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-alloy-netpol"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    helm:
      releaseName: alloy-netpol
      values: |
        resources:
          -apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-same-namespace
              namespace: alloy-system
            spec:
              podSelector: {}
              policyTypes:
                - Ingress
                - Egress
              ingress:
                - from:
                  - podSelector: {}
              egress:
                - to:
                  - podSelector: {}
            - apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                name: allow-egress-from-alloy-to-central-logging
                namespace: alloy-system
              spec:
                egress:
                {{- range (required "global.loggingCidrs is required" .Values.global.loggingCidrs) }}
                  - ports:
                    - protocol: TCP
                      port: 443
                    to:
                      - ipBlock:
                          cidr: {{ . | quote }}
                {{- end }}
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: alloy
                policyTypes:
                - Egress
            {{ if .Values.global.clusterHasLoki }}
            - apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                name: allow-egress-to-loki-from-alloy
                namespace: alloy-system
              spec:
                egress:
                - ports:
                  - port: 8080
                    protocol: TCP
                  to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: loki-system
                    podSelector:
                      matchLabels:
                        app.kubernetes.io/component: gateway
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: alloy
                policyTypes:
                - Egress
              {{- end }}
  destination:
    name: {{ .Values.global.cluster }}
    namespace: platform-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
