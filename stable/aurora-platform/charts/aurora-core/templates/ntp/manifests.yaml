{{ if .Values.components.ntp.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-configure-ntp"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    helm:
      releaseName: configure-ntp
      values: |
        resources:
          - apiVersion: apps/v1
            kind: DaemonSet
            metadata:
              name: configure-ntp
              namespace: ntp-system
            spec:
              selector:
                matchLabels:
                  app.kubernetes.io/name: configure-ntp
              template:
                metadata:
                  labels:
                    app.kubernetes.io/name: configure-ntp
                spec:
                  tolerations: {{ toYaml .Values.components.ntp.tolerations | nindent 20 }}
                  volumes:
                    - name: root
                      hostPath:
                        path: /
                        type: ''
                  imagePullSecrets: {{ toYaml .Values.components.ntp.imagePullSecrets | nindent 20 }}
                  containers:
                    - name: configure-ntp
                      image: {{ include "ntp.image" . | quote }}
                      imagePullPolicy: IfNotPresent
                      # Security context must be inside the container block
                      securityContext:
                        privileged: true
                      command:
                        - chroot
                        - /mnt
                        - /bin/bash
                        - -c
                        - |
                            # FIX 1: Hardcode the PATH. Do NOT use $PATH here.
                            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
                            
                            set -o errexit
                            set -o xtrace

                            # Package Installation with Cleanup to save memory
                            if command -v apt-get &> /dev/null; then
                                apt-get update && apt-get install -y chrony
                                apt-get clean
                            elif command -v tdnf &> /dev/null; then
                                tdnf install -y chrony
                                tdnf clean all
                            fi

                            # Disable other NTP daemons
                            systemctl is-active systemd-timesyncd && systemctl stop systemd-timesyncd || true
                            systemctl is-enabled systemd-timesyncd && systemctl disable systemd-timesyncd || true

                            # FIX: Create the directory before writing the config file
                            mkdir -p /etc/chrony

                            # Configure and enable chrony
                            cat >/etc/chrony/chrony.conf <<EOF
                            {{- range .Values.components.ntp.pools }}
                            pool {{ .server }} {{ .options | default "" }}
                            {{- end }}

                            keyfile /etc/chrony/chrony.keys
                            driftfile /var/lib/chrony/chrony.drift
                            logdir /var/log/chrony
                            maxupdateskew 100.0
                            rtcsync
                            makestep 1.0 -1
                            EOF

                            # Compatibility link for Azure Linux/RHEL style config paths
                            ln -sf /etc/chrony/chrony.conf /etc/chrony.conf

                            # Start the correct service (chrony vs chronyd)
                            if systemctl list-unit-files | grep -q chronyd.service; then
                                systemctl restart chronyd && systemctl enable chronyd
                            else
                                systemctl restart chrony && systemctl enable chrony
                            fi

                            sleep infinity
                      tty: true
                      volumeMounts:
                        - name: root
                          mountPath: /mnt
                      resources: {{ toYaml .Values.components.ntp.resources | nindent 24 }}
                  hostIPC: true
                  hostNetwork: true
                  hostPID: true
  destination:
    name: {{ .Values.global.cluster }}
    namespace: ntp-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
