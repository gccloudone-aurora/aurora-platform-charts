{{ if and .Values.components.thanos.enabled .Values.components.prometheus.enabled -}}
{{- $t := .Values.components.thanos -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-thanos-compactor"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    plugin:
      env:
        - name: HELM_RELEASE_NAME
          value: "thanos-compactor"
        - name: HELM_VALUES
          value: |
            resources:
              - apiVersion: v1
                kind: ServiceAccount
                metadata:
                  name: thanos-compactor
                  namespace: prometheus-system
                  annotations:
                    {{- include "thanos.workloadIdentity.clientId" . | nindent 20 }}
                  labels:
                    app.kubernetes.io/name: thanos-compactor
                    app.kubernetes.io/component: compactor
                    app.kubernetes.io/part-of: thanos
                    app.kubernetes.io/managed-by: argo
              - apiVersion: apps/v1
                kind: StatefulSet
                metadata:
                  name: thanos-compactor
                  namespace: prometheus-system
                  labels:
                    app.kubernetes.io/name: thanos-compactor
                    app.kubernetes.io/component: compactor
                    app.kubernetes.io/part-of: thanos
                    app.kubernetes.io/managed-by: argo
                spec:
                  # SINGLETON: exactly one Compactor per bucket. Never scale >1 — concurrent
                  # compactors can corrupt the object-storage bucket. Do not parameterize.
                  replicas: 1
                  serviceName: thanos-compactor
                  selector:
                    matchLabels:
                      app.kubernetes.io/name: thanos-compactor
                  template:
                    metadata:
                      labels:
                        app.kubernetes.io/name: thanos-compactor
                        app.kubernetes.io/component: compactor
                        app.kubernetes.io/part-of: thanos
                        {{- if eq $t.objectStorage.auth "workloadIdentity" }}
                        azure.workload.identity/use: "true"
                        {{- end }}
                    spec:
                      serviceAccountName: thanos-compactor
                      priorityClassName: {{ $t.priorityClassName }}
                      nodeSelector: {{ toYaml $t.compactor.nodeSelector | nindent 24 }}
                      tolerations: {{ toYaml $t.compactor.tolerations | nindent 24 }}
                      affinity: {{ toYaml $t.compactor.affinity | nindent 24 }}
                      securityContext:
                        runAsNonRoot: true
                        runAsUser: 1001
                        runAsGroup: 1001
                        fsGroup: 1001
                        seccompProfile:
                          type: RuntimeDefault
                      containers:
                        - name: thanos-compactor
                          image: {{ include "thanos.image" . }}
                          imagePullPolicy: {{ default "IfNotPresent" $t.image.pullPolicy }}
                          args:
                            - compact
                            - --wait
                            - --log.level={{ $t.logLevel }}
                            - --http-address=0.0.0.0:10902
                            - --data-dir=/var/thanos/compact
                            - --objstore.config-file=/etc/thanos/objstore.yml
                            - --retention.resolution-raw={{ $t.compactor.retention.raw }}
                            - --retention.resolution-5m={{ $t.compactor.retention.fiveMin }}
                            - --retention.resolution-1h={{ $t.compactor.retention.oneHour }}
                          ports:
                            - name: http
                              containerPort: 10902
                          resources: {{ toYaml $t.compactor.resources | nindent 28 }}
                          livenessProbe:
                            httpGet:
                              path: /-/healthy
                              port: http
                            initialDelaySeconds: 30
                          readinessProbe:
                            httpGet:
                              path: /-/ready
                              port: http
                            initialDelaySeconds: 15
                          securityContext:
                            allowPrivilegeEscalation: false
                            readOnlyRootFilesystem: true
                            capabilities:
                              drop: ["ALL"]
                          volumeMounts:
                            - name: objstore-config
                              mountPath: /etc/thanos
                              readOnly: true
                            - name: data
                              mountPath: /var/thanos/compact
                      volumes:
                        - name: objstore-config
                          secret:
                            secretName: thanos-objstore-config
                  volumeClaimTemplates:
                    - metadata:
                        name: data
                      spec:
                        accessModes: ["ReadWriteOnce"]
                        storageClassName: {{ $t.compactor.persistence.storageClassName }}
                        resources:
                          requests:
                            storage: {{ $t.compactor.persistence.size }}
              - apiVersion: v1
                kind: Service
                metadata:
                  name: thanos-compactor
                  namespace: prometheus-system
                  labels:
                    app.kubernetes.io/name: thanos-compactor
                    app.kubernetes.io/component: compactor
                    app.kubernetes.io/part-of: thanos
                    app.kubernetes.io/managed-by: argo
                spec:
                  selector:
                    app.kubernetes.io/name: thanos-compactor
                  ports:
                    - name: http
                      port: 10902
                      targetPort: http
  destination:
    name: {{ .Values.global.cluster }}
    namespace: prometheus-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
