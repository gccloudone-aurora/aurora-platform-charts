{{ if and .Values.components.thanos.enabled .Values.components.prometheus.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-thanos-netpol"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    helm:
      releaseName: thanos-netpol
      values: |
        resources:
          # Store Gateway and Compactor read/write metric blocks in Azure Blob.
          # (Phase 1's object-storage egress rule only selects the Prometheus pod.)
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-to-object-storage-from-thanos
              namespace: prometheus-system
            spec:
              podSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - thanos-storegateway
                      - thanos-compactor
              policyTypes:
                - Egress
              egress:
                - ports:
                    - port: 443
                      protocol: TCP
                  to:
                    - ipBlock:
                        cidr: 0.0.0.0/0
          # Grafana (grafana-system) queries the Thanos Querier over HTTP :9090.
          # Grafana egress to prometheus-system:9090 is already allowed by the
          # grafana component's allow-egress-to-prometheus-system policy.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-ingress-from-grafana-system-to-thanos-query
              namespace: prometheus-system
            spec:
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: thanos-query
              policyTypes:
                - Ingress
              ingress:
                - from:
                    - namespaceSelector: {}
                      podSelector:
                        matchLabels:
                          app: grafana
                  ports:
                    - protocol: TCP
                      port: 9090
  destination:
    name: {{ .Values.global.cluster }}
    namespace: platform-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
