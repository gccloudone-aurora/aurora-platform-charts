{{ if .Values.components.cilium.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-cilium"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ default "cilium" .Values.components.cilium.helm.chart }}
    {{- if .Values.components.cilium.helm.repository }}
    repoURL: {{ .Values.components.cilium.helm.repository }}
    {{- else }}
    repoURL: {{ default "https://helm.cilium.io" .Values.global.helm.repository }}
    {{- end }}
    targetRevision: {{ default "1.19.2" .Values.components.cilium.helm.targetRevision }}
    plugin:
      env:
        - name: HELM_RELEASE_NAME
          value: "cilium"
        - name: HELM_VALUES
          value: |
            aksbyocni:
              enabled: false

            {{- if .Values.components.cilium.k8sServiceHost }}
            k8sServiceHost: {{ .Values.components.cilium.k8sServiceHost }}
            k8sServicePort: 443
            {{- end }}

            bgp:
              # Should only be enabled if bgpControlPlane = false
              enabled: false
            bgpControlPlane:
              enabled: {{ .Values.components.cilium.bgpControlPlane.enabled }}

            cluster:
              id: 1
              name: {{ .Values.global.cluster }}-aks

            cni:
              uninstall: false
              # Allows Istio-CNI to write configuration to same directory as Cilium
              exclusive: false

            socketLB:
              enabled: true
              # Prevents Cilium from bypassing Istio proxies
              hostNamespaceOnly: true

            {{ include "cilium.ipam" . | nindent 12 }}

            enableIPv4Masquerade: {{ default false .Values.components.cilium.enableIPv4Masquerade }}
            enableIPv6Masquerade: {{ default false .Values.components.cilium.enableIPv6Masquerade }}

            # cilium-agent
            image: {{ default "{}" (include "cilium.image" .) | nindent 14 }}
            imagePullSecrets: {{ toYaml .Values.components.cilium.imagePullSecrets | nindent 14 }}
            nodeSelector:
              kubernetes.io/os: linux
            tolerations:
              - operator: Exists

            apiserver:
              image: {{ default "{}" (include "cilium.apiserver.image" .) | nindent 16 }}
              etcd:
                image: {{ default "{}" (include "cilium.apiserver.etcd.image" .) | nindent 18 }}
              nodeSelector: {{ toYaml .Values.components.cilium.nodeSelector | nindent 16 }}
              tolerations: {{ toYaml .Values.components.cilium.tolerations | nindent 16 }}

            # Configure certificate generation for Hubble integration
            certgen:
              image: {{ default "{}" (include "cilium.certgen.image" .) | nindent 16 }}
              tolerations: {{ toYaml .Values.components.cilium.tolerations | nindent 16 }}

            # Networking and security observability platform
            hubble:
              enabled: true

              # Provides a cluster-wide API for querying Hubble flow data, which can be accessed directly or
              # via the Hubble CLI and UI
              relay:
                enabled: true
                podSecurityContext:
                  runAsNonRoot: true
                  runAsUser: 1000
                  runAsGroup: 1000
                  fsGroup: 1000
                  seccompProfile:
                    type: RuntimeDefault
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                  seccompProfile:
                    type: RuntimeDefault
                image: {{ default "{}" (include "cilium.hubble.relay.image" .) | nindent 18 }}
                nodeSelector: {{ toYaml .Values.components.cilium.nodeSelector | nindent 18 }}
                tolerations: {{ toYaml .Values.components.cilium.tolerations | nindent 18 }}

              ui:
                enabled: true
                podSecurityContext:
                  runAsNonRoot: true
                  runAsUser: 101
                  runAsGroup: 101
                  fsGroup: 101
                  seccompProfile:
                    type: RuntimeDefault
                securityContext:
                  enabled: true
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                nodeSelector: {{ toYaml .Values.components.cilium.nodeSelector | nindent 18 }}
                tolerations: {{ toYaml .Values.components.cilium.tolerations | nindent 18 }}
                backend:
                  securityContext:
                    allowPrivilegeEscalation: false
                    runAsNonRoot: true
                    capabilities:
                      drop:
                        - ALL
                    seccompProfile:
                      type: RuntimeDefault
                  image: {{ default "{}" (include "cilium.hubble.ui.backend.image" .) | nindent 20 }}
                frontend:
                  securityContext:
                    allowPrivilegeEscalation: false
                    runAsNonRoot: true
                    capabilities:
                      drop:
                        - ALL
                    seccompProfile:
                      type: RuntimeDefault
                  image: {{ default "{}" (include "cilium.hubble.ui.frontend.image" .) | nindent 20 }}

            operator:
              enabled: true
              image: {{ default "{}" (include "cilium.operator.image" .) | nindent 16 }}
              nodeSelector: {{ toYaml .Values.components.cilium.nodeSelector | nindent 16 }}
              tolerations: {{ toYaml .Values.components.cilium.tolerations | nindent 16 }}
              prometheus:
                enabled: false

            # etcd mode for the agent
            etcd:
              enabled: false
              image: {{ default "{}" (include "cilium.etcd.image" .) | nindent 16 }}
              tolerations:
                - operator: Exists

            envoy:
              enabled: false
              image: {{ default "{}" (include "cilium.envoy.image" .) | nindent 16 }}
              nodeSelector: {{ toYaml .Values.components.cilium.nodeSelector | nindent 16 }}
              tolerations: {{ toYaml .Values.components.cilium.tolerations | nindent 16 }}

            # The node initialization DaemonSet
            nodeinit:
              enabled: false
              image: {{ default "{}" (include "cilium.nodeinit.image" .) | nindent 16 }}
              nodeSelector: {{ toYaml .Values.components.cilium.nodeSelector | nindent 16 }}
              tolerations: {{ toYaml .Values.components.cilium.tolerations | nindent 16 }}

            #  Cilium pre-flight resources (required for upgrade)
            preflight:
              enabled: false
              image: {{ default "{}" (include "cilium.preflight.image" .) | nindent 16 }}
              nodeSelector: {{ toYaml .Values.components.cilium.nodeSelector | nindent 16 }}
              tolerations: {{ toYaml .Values.components.cilium.tolerations | nindent 16 }}
  destination:
    name: {{ .Values.global.cluster }}
    namespace: cilium-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  # Fixed ignoreDifferences structure based on ArgoCD UI diff
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: hubble-ca-cert
      jsonPointers:
        - /data/ca.crt
    - group: ""
      kind: Secret
      name: hubble-relay-client-certs
      jsonPointers:
        - /data/ca.crt
        - /data/tls.crt
        - /data/tls.key
    - group: ""
      kind: Secret
      name: hubble-server-certs
      jsonPointers:
        - /data/ca.crt
        - /data/tls.crt
        - /data/tls.key

{{- end }}
