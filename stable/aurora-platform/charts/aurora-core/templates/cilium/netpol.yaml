{{ if .Values.components.cilium.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-cilium-netpol"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    helm:
      releaseName: cilium-netpol
      values: |
        resources:
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-same-namespace
              namespace: cilium-system
            spec:
              podSelector: {}
              policyTypes:
                - Ingress
                - Egress
              ingress:
                - from:
                  - podSelector: {}
              egress:
                - to:
                  - podSelector: {}
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-ingress-from-apiserver-to-cilium
              namespace: cilium-system
            spec:
              description: |
                API server reaches Cilium operator/agent webhooks and health endpoints as needed.
              endpointSelector: {}
              ingress:
                - fromEntities:
                    - kube-apiserver
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-egress-to-apiserver-from-cilium
              namespace: cilium-system
            spec:
              description: |
                Cilium agents and operator sync cluster state via the Kubernetes API.
                Ports 443 and 6443 cover both ways the API server is reached: the in-cluster
                kubernetes Service (443) and the API server's native secure port (6443).
              endpointSelector: {}
              egress:
                - toEntities:
                    - kube-apiserver
                  toPorts:
                    - ports:
                        - port: "443"
                        - port: "6443"
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-egress-from-hubble-relay-to-cilium-agents
              namespace: cilium-system
            spec:
              endpointSelector:
                matchLabels:
                  io.cilium.k8s.policy.serviceaccount: hubble-relay
              egress:
                - toEntities:
                  - host
                  - remote-node
  destination:
    name: {{ .Values.global.cluster }}
    namespace: platform-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
