    # velero: {}

###########
### APP ###
###########
app:
  # Application Platform components are disabled by default
  # and enabled per-cluster which requires them.
  enabled: false

  components: {}
    # argoController: {}
    # argoWorkflow: {}
    # elastic: {}
    # istio: {}
    # kiali: {}
    # sidecarTerminator: {}
    # solr: {}
    # strimzi: {}

############
### MGMT ###
############
mgmt:
  # Management Platform components are disabled by default
  # and enabled per-cluster which requires them.
  enabled: false

  components: {}
    # argoOperator: {}
    # argoFoundation: {}
    # argoSolution: {}
    # billOfLanding: {}
    # loki: {}
