  rbac: {}
    # platformAdmin: {}
    # platformOperator: {}
    # securityOperations: {}

  components: {}
    # auroraController: {}
    # awsEbsCsiDriver: {}
    # awsLoadbalancerController: {}
    # certManager: {}
    # cidrAllocator: {}
    # cilium: {}
    # falco: {}
    # fluentOperator: {}
    # gatekeeper: {}
    # kubebench: {}
    # kubecost: {}
    # kubernetesEventExporter: {}
    # ntp: {}
    # podtracker: {}
    # prometheus: {}
    # secretsStoreCSIDriver: {}
    # tetragon: {}
    # trivy-operator: {}
    # trustManager: {}
