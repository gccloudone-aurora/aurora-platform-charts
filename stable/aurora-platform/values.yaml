# Aurora platform Helm chart configuration for Kubernetes deployments.
# Replace all <FILLIN_...> placeholders with environment-specific values before deployment.
# Some sections (for example under core.components) are enabled only when set to enabled: true.

global:
  helm: {}
    # Override all Helm applications to pull
    # their helm chart from the following
    # repository.
    #
    # You can override specific charts below
    # in the components section.
    # repository: https://myrepo.example.ca

  container: {}
    # Override all applications to pull
    # their container from the following
    # registry.
    #
    # You can override specific charts below
    # in the components section.
    # registry: docker.io

  namespace:
    helm:
      chart: "aurora-namespace"
      targetRevision: "0.0.22"
      repository: "https://gccloudone-aurora.github.io/aurora-platform-charts"

  raw:
    helm:
      chart: "raw"
      targetRevision: "0.0.1"
      repository: "https://gccloudone-aurora.github.io/aurora-platform-charts"

  # azure or aws or gcp
  provider: azure

  # Name of the Kubernetes cluster.
  cluster: in-cluster

  # Domain for ingress.
  ingressDomain: example.ca

  # Ingress Class Name
  # ingressClassName: ingress-istio-controller

  # CIDR for the Kubernetes API server.
  apiServerCidr: "192.0.2.10/32"

  # The Azure Metadata API
  azureMetadataApiCidr: "169.254.169.254/32"

  # Optional: Uncomment and configure CIDRs for alert manager, logging, and vault if needed for security policies.
  alertManagerCidrs: ["172.26.26.132/32"]
  loggingCidrs: ["172.26.26.132/32"]
  # vaultCidrs: ["172.23.211.18/32"]

  # Indicates if Loki logging is enabled cluster-wide.
  # clusterHasLoki: false

  # Azure-specific settings.
  # load_balancer_subnet_name:
  # subscriptionId:
  # tenantId:

  # child values import via dependencies
  # imports:
    # app:
      # Used in cases where a subchart's component depends on the aurora-app subchart being enabled
      # enabled: false
    # mgmt:
      # Used in cases where a subchart's component depends on the aurora-mgmt subchart being enabled
      # enabled: false

#############
### CORE ###
############
core:
